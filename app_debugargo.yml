apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argo-debug
  namespace: argocd
  annotations:
    notifications.argoproj.io/subscribe.on-deployed-trigger.on-deployed-webhook: ""
spec:
  project: default

  source:
    repoURL: "https://github.com/pp0rtal/debug-argocd"
    targetRevision: HEAD
    path: argo/k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: debug-argo

  syncPolicy:
    syncOptions:
    - CreateNamespace=true

    automated:
      selfHeal: true
      prune: true
